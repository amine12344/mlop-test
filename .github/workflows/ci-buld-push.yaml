name: Validate, build, and push images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate API Docker build
        run: docker build -t mlop-api ./app

      - name: Validate frontend Docker build
        run: docker build -t mlop-frontend ./frontend

      - name: Validate Helm chart
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm lint helm/mlop-test
          helm template mlop-test-helm helm/mlop-test -n mlop-test-helm >/dev/null

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: ./app
            image: ghcr.io/${{ github.repository_owner }}/mlop-api
          - name: frontend
            context: ./frontend
            image: ghcr.io/${{ github.repository_owner }}/mlop-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}