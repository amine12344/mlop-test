name: Build images and update Helm chart

on:
  push:
    branches:
      - feature/kind-kube
    paths-ignore:
      - 'helm/mlop-test/values.yaml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mlop-test-api:sha-${{ steps.vars.outputs.short_sha }}
            ghcr.io/${{ github.repository_owner }}/mlop-test-api:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mlop-test-frontend:sha-${{ steps.vars.outputs.short_sha }}
            ghcr.io/${{ github.repository_owner }}/mlop-test-frontend:latest

  update-helm-values:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feature/kind-kube

      - name: Update Helm values with new image tag
        env:
          SHORT_SHA: ${{ needs.build-and-push.outputs.short_sha }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("helm/mlop-test/values.yaml")
          text = path.read_text()

          text = re.sub(
              r'(repository:\s*ghcr\.io/[^/\n]+/mlop-test-api\s*\n\s*tag:\s*)[^\n]+',
              r'\1sha-' + __import__("os").environ["SHORT_SHA"],
              text
          )

          text = re.sub(
              r'(repository:\s*ghcr\.io/[^/\n]+/mlop-test-frontend\s*\n\s*tag:\s*)[^\n]+',
              r'\1sha-' + __import__("os").environ["SHORT_SHA"],
              text
          )

          path.write_text(text)
          PY

      - name: Commit updated Helm values
        env:
          SHORT_SHA: ${{ needs.build-and-push.outputs.short_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/mlop-test/values.yaml
          git diff --cached --quiet && exit 0
          git commit -m "ci: update image tags to sha-${SHORT_SHA} [skip ci]"
          git push