services:
  proxy:
    image: nginx:alpine
    ports:
      - 8080:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - frontend
      - backend
  
  api:
    build: ./app
    environment:
      PORT: 8080
      DB_HOST: db
      DB_USER: postgres
      DB_NAME: postgres
      DB_PORT: 5432
    depends_on:
      - db
    networks:
      - backend
  
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-shell", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
  
networks:
  frontend: {}
  backend: {}
  
volumes:
  pgdata: {}