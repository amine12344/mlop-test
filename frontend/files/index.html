<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MLOP Test Lab</title>
  <script>
    window.__FRONTEND_VERSION__ = "v1.0.0";
  </script>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #0f172a; color: #e2e8f0; }
    button { margin-right: .5rem; padding: .5rem .75rem; }
    pre { background: #111827; padding: 1rem; border-radius: 8px; overflow: auto; }
    .badge { display: inline-block; padding: .35rem .6rem; border-radius: 999px; background: #334155; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 1rem; max-width: 900px; }
    .card { background: #1e293b; padding: 1rem; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>MLOP Test Lab</h1>
  <p>Frontend → API → PostgreSQL → Argo CD</p>

  <div>
    <button onclick="callApi()">API</button>
    <button onclick="callDb()">DB</button>
    <button onclick="loadStatus()">Refresh Status</button>
    <button onclick="clearOutput()">Clear</button>
  </div>

  <p>Frontend status: <span id="status" class="badge">Unknown</span></p>
  <pre id="output">Click a button...</pre>

  <h2>/status</h2>
  <div class="grid">
    <div class="card"><strong>Frontend Version</strong><div id="frontendVersion">-</div></div>
    <div class="card"><strong>API Version</strong><div id="apiVersion">-</div></div>
    <div class="card"><strong>API Ready</strong><div id="apiReady">-</div></div>
    <div class="card"><strong>DB Status</strong><div id="dbStatus">-</div></div>
    <div class="card"><strong>Last checked</strong><div id="lastChecked">-</div></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
