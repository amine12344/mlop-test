namespaceOverride: mlop-test

imagePullSecrets: []

api:
  replicaCount: 1
  image:
    repository: ghcr.io/amine12344/mlop-test-api
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  service:
    port: 8080
  env:
    PORT: "8080"
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: mlop
    DB_USER: mlop
    DB_PASSWORD: mlop
    APP_VERSION: "v1.0.0"
  probes:
    livenessPath: /healthz
    readinessPath: /readyz

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/amine12344/mlop-test-frontend
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  service:
    port: 80
  env:
    FRONTEND_VERSION: "v1.0.0"

postgres:
  replicaCount: 1
  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  auth:
    database: mlop
    username: mlop
    password: mlop
  persistence:
    enabled: false

ingress:
  enabled: true
  className: nginx
  host: mlop.local