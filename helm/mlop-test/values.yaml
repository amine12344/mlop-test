namespace: mlop-test
postgres:
  replicaCount: 1
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  containerPort: 5432
  auth:
    user: postgres
    password: postgres
    database: postgres
api:
  replicaCount: 1
  image:
    repository: ghcr.io/amine12344/mlop-test-api
    tag: "sha-acda3def5e9b4da9aec90a67d876c04165a4919c"
    pullPolicy: Always
  service:
    port: 8080
  containerPort: 8080
  env:
    PORT: "8080"
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: postgres
    DB_USER: postgres
    APP_VERSION: "sha-acda3def5e9b4da9aec90a67d876c04165a4919c"
frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/amine12344/mlop-test-frontend
    tag: "sha-acda3def5e9b4da9aec90a67d876c04165a4919c"
    pullPolicy: Always
  service:
    port: 80
  containerPort: 80
  env:
    FRONTEND_VERSION: "sha-acda3def5e9b4da9aec90a67d876c04165a4919c"
ingress:
  enabled: true
  className: nginx
  host: mlop.local
