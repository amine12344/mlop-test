namespace: mlop-test-helm
api:
  replicaCount: 1
  image:
    repository: ghcr.io/amine12344/mlop-test-api
    tag: v1.1.0
    pullPolicy: IfNotPresent
  port: 8080
  env:
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_NAME: postgres
    DB_USER: postgres
    APP_VERSION: v1.1.0
frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/amine12344/mlop-test-frontend
    tag: v1.1.0
    pullPolicy: IfNotPresent
  port: 80
  env:
    FRONTEND_VERSION: v1.1.0
postgres:
  replicaCount: 1
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  port: 5432
  auth:
    user: postgres
    password: postgres
    database: postgres
ingress:
  enabled: true
  className: nginx
  host: mlop.local
